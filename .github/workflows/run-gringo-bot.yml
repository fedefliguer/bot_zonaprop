name: Run Gringo Bot

on:
  schedule:
    # Corre cada hora en el minuto 5
    # De 10:00 UTC a 03:00 UTC (+/- 07:00 a 00:00 ART)
    - cron: '5 10-23,0-3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r bot_zonaprop/requirements.txt

      - name: Run Gringo Bot
        working-directory: ./bot_zonaprop
        run: python app_gringo.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
